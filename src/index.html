<!DOCTYPE html>
<html dir="ltr" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0"
    />

    <title>Datepicker</title>

    <link rel="stylesheet" href="/themes/light.css" />

    <script type="module" src="/build/wc-datepicker.esm.js"></script>
    <script nomodule src="/build/wc-datepicker.js"></script>
  </head>
  <body>
    <main>
      <h1>Datepicker</h1>

      <section>
        <h2>Single selection</h2>
        <wc-datepicker id="datepicker"></wc-datepicker>
      </section>
      <section>
        <h2>Range selection</h2>
        <wc-datepicker selection-mode="range"></wc-datepicker>
      </section>
      <section>
        <h2>Multiple selection</h2>
        <wc-datepicker selection-mode="multiple"></wc-datepicker>
      </section>
      <section>
        <h2>Disabled</h2>
        <wc-datepicker disabled></wc-datepicker>
      </section>
      <section>
        <h2>Min and max date</h2>
        <wc-datepicker
          min-date="2026-04-05"
          max-date="2026-05-06"
        ></wc-datepicker>
      </section>
    </main>

    <script>
      const datepicker = document.getElementById('datepicker');

      datepicker.addEventListener('selectDate', (event) => {
        console.log(event);
      });

      datepicker.addEventListener('changeMonth', (event) => {
        console.log(event);
      });

      datepicker.disableDate = (date) =>
        date.getDay() === 6 || date.getDay() === 0;
    </script>
  </body>
</html>
